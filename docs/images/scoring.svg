<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Endpoint Scoring Matrix</text>

  <!-- Score Card -->
  <rect x="30" y="70" width="200" height="200" rx="15" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  <text x="130" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea" text-anchor="middle">SCORE COMPONENTS</text>

  <!-- Score Items -->
  <rect x="50" y="120" width="160" height="30" rx="5" fill="#3d3d54"/>
  <text x="130" y="140" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">"id" in endpoint → +5</text>

  <rect x="50" y="155" width="160" height="30" rx="5" fill="#3d3d54"/>
  <text x="130" y="175" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">"user" in endpoint → +4</text>

  <rect x="50" y="190" width="160" height="30" rx="5" fill="#3d3d54"/>
  <text x="130" y="210" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">"org" in endpoint → +4</text>

  <rect x="50" y="225" width="160" height="30" rx="5" fill="#3d3d54"/>
  <text x="130" y="245" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">"admin" in endpoint → +6</text>

  <!-- Score Examples -->
  <rect x="280" y="70" width="490" height="200" rx="15" fill="#2d2d44" stroke="#43e97b" stroke-width="2"/>
  <text x="525" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#43e97b" text-anchor="middle">EXAMPLE ENDPOINTS</text>

  <!-- Example 1 -->
  <rect x="300" y="120" width="450" height="35" rx="5" fill="#3d3d54"/>
  <text x="320" y="142" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="start">/api/users?id=123</text>
  <text x="730" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b" text-anchor="end">Score: 10</text>

  <!-- Example 2 -->
  <rect x="300" y="160" width="450" height="35" rx="5" fill="#3d3d54"/>
  <text x="320" y="182" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="start">/api/admin/users?id=456</text>
  <text x="730" y="182" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b" text-anchor="end">Score: 18</text>

  <!-- Example 3 -->
  <rect x="300" y="200" width="450" height="35" rx="5" fill="#3d3d54"/>
  <text x="320" y="222" font-family="Arial, sans-serif" font-size="11" fill="#aaa" text-anchor="start">/api/orgs/123/pipelines</text>
  <text x="730" y="222" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#43e97b" text-anchor="end">Score: 13</text>

  <!-- Filter Section -->
  <rect x="30" y="290" width="200" height="180" rx="15" fill="#2d2d44" stroke="#f093fb" stroke-width="2"/>
  <text x="130" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f093fb" text-anchor="middle">FILTER RULES</text>

  <text x="130" y="355" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">✓ KEEP:</text>
  <text x="130" y="375" font-family="Arial, sans-serif" font-size="10" fill="#43e97b" text-anchor="middle">• /api endpoints</text>
  <text x="130" y="392" font-family="Arial, sans-serif" font-size="10" fill="#43e97b" text-anchor="middle">• With auth headers/cookies</text>

  <text x="130" y="420" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">✗ REMOVE:</text>
  <text x="130" y="440" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle">• .js, .css, images</text>
  <text x="130" y="457" font-family="Arial, sans-serif" font-size="10" fill="#f5576c" text-anchor="middle">• Non-API endpoints</text>

  <!-- Normalization Section -->
  <rect x="280" y="290" width="490" height="180" rx="15" fill="#2d2d44" stroke="#4facfe" stroke-width="2"/>
  <text x="525" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4facfe" text-anchor="middle">ENDPOINT NORMALIZATION</text>

  <!-- Before -->
  <text x="300" y="355" font-family="Arial, sans-serif" font-size="12" fill="#aaa" text-anchor="start">Before:</text>
  <rect x="300" y="365" width="200" height="30" rx="5" fill="#3d3d54"/>
  <text x="400" y="385" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">/api/orgs/123</text>
  <rect x="300" y="400" width="200" height="30" rx="5" fill="#3d3d54"/>
  <text x="400" y="420" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">/api/users/456</text>
  <rect x="300" y="435" width="200" height="30" rx="5" fill="#3d3d54"/>
  <text x="400" y="455" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">/api/repos/789/pr</text>

  <!-- Arrow -->
  <path d="M510 405 L540 405" stroke="#4facfe" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs><marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/></marker></defs>

  <!-- After -->
  <text x="560" y="355" font-family="Arial, sans-serif" font-size="12" fill="#aaa" text-anchor="start">After:</text>
  <rect x="560" y="365" width="180" height="30" rx="5" fill="#4facfe"/>
  <text x="650" y="385" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">/api/orgs/{id}</text>
  <rect x="560" y="400" width="180" height="30" rx="5" fill="#4facfe"/>
  <text x="650" y="420" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">/api/users/{id}</text>
  <rect x="560" y="435" width="180" height="30" rx="5" fill="#4facfe"/>
  <text x="650" y="455" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">/api/repos/{id}/pr</text>
</svg>
