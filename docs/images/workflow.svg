<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="analysisGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="safeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">BugHunter Workflow</text>

  <!-- INPUT Stage -->
  <rect x="50" y="80" width="150" height="80" rx="10" fill="url(#inputGrad)"/>
  <text x="125" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">INPUT</text>
  <text x="125" y="130" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">URLs / Traffic.json</text>
  <text x="125" y="145" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">--input flag</text>

  <!-- Arrow 1 -->
  <path d="M200 120 L250 120" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/></marker></defs>

  <!-- FILTER Stage -->
  <rect x="260" y="80" width="150" height="80" rx="10" fill="url(#analysisGrad)"/>
  <text x="335" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">FILTER</text>
  <text x="335" y="130" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">API endpoints only</text>
  <text x="335" y="145" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Authenticated</text>

  <!-- Arrow 2 -->
  <path d="M410 120 L460 120" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead2)"/>
  <defs><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/></marker></defs>

  <!-- SCORE Stage -->
  <rect x="470" y="80" width="150" height="80" rx="10" fill="url(#safeGrad)"/>
  <text x="545" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SCORE</text>
  <text x="545" y="130" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">id +5 | user +4</text>
  <text x="545" y="145" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">org +4</text>

  <!-- Arrow 3 -->
  <path d="M620 120 L670 120" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead3)"/>
  <defs><marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/></marker></defs>

  <!-- TARGETS Stage -->
  <rect x="680" y="80" width="100" height="80" rx="10" fill="url(#outputGrad)"/>
  <text x="730" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">TARGETS</text>
  <text x="730" y="130" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Top 1-2</text>
  <text x="730" y="145" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">High Score</text>

  <!-- EXECUTION Section -->
  <rect x="50" y="220" width="730" height="120" rx="15" fill="#2d2d44" stroke="#667eea" stroke-width="2"/>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">EXECUTION ENGINE</text>

  <!-- Payloads Box -->
  <rect x="80" y="270" width="180" height="50" rx="8" fill="#f093fb"/>
  <text x="170" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">PAYLOADS</text>
  <text x="170" y="310" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">1, 2, 999</text>

  <!-- Arrow -->
  <path d="M270 295 L320 295" stroke="#f093fb" stroke-width="2" marker-end="url(#arrow4)"/>
  <defs><marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f093fb"/></marker></defs>

  <!-- Requests Box -->
  <rect x="330" y="270" width="180" height="50" rx="8" fill="#4facfe"/>
  <text x="420" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">BUILD REQUESTS</text>
  <text x="420" y="310" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">GET /api/user?id=X</text>

  <!-- Arrow -->
  <path d="M520 295 L570 295" stroke="#4facfe" stroke-width="2" marker-end="url(#arrow5)"/>
  <defs><marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4facfe"/></marker></defs>

  <!-- Proxy Box -->
  <rect x="580" y="270" width="180" height="50" rx="8" fill="#43e97b"/>
  <text x="670" y="295" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">VIA PROXY</text>
  <text x="670" y="310" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">127.0.0.1:8080</text>

  <!-- CONFIRMATION -->
  <rect x="200" y="380" width="400" height="60" rx="10" fill="#fa709a" stroke="white" stroke-width="2"/>
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">⚠️ CONFIRMATION REQUIRED</text>
  <text x="400" y="428" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Proceed? (y/n)</text>

  <!-- Arrow down -->
  <path d="M400 440 L400 470" stroke="#fa709a" stroke-width="3" marker-end="url(#arrow6)"/>
  <defs><marker id="arrow6" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fa709a"/></marker></defs>

  <!-- ANALYSIS Output -->
  <rect x="200" y="480" width="400" height="100" rx="15" fill="url(#outputGrad)"/>
  <text x="400" y="510" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">ANALYSIS OUTPUT</text>
  <text x="400" y="535" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">[!] Possible vulnerability detected</text>
  <text x="400" y="555" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">Confidence: 0.78 | Next step: Verify manually</text>

  <!-- Safety Box -->
  <rect x="50" y="480" width="120" height="60" rx="8" fill="#fee140"/>
  <text x="110" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a2e" text-anchor="middle">SAFETY</text>
  <text x="110" y="520" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e" text-anchor="middle">max: 5</text>
  <text x="110" y="532" font-family="Arial, sans-serif" font-size="9" fill="#1a1a2e" text-anchor="middle">delay: 1s</text>

  <!-- Live Mode Box -->
  <rect x="630" y="480" width="120" height="60" rx="8" fill="#764ba2"/>
  <text x="690" y="505" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">LIVE MODE</text>
  <text x="690" y="520" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">--live</text>
  <text x="690" y="532" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">--live-attack</text>
</svg>
